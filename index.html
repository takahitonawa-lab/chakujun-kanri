<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>着順管理 -ワンボタン記録-</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #1a1a1a; color: #e5e5e5; font-family: sans-serif; }
        .active-park { border: 2px solid #eab308; background-color: #374151 !important; }
        #toast { transition: opacity 0.3s, transform 0.3s; }
    </style>
</head>
<body class="p-4 flex flex-col h-screen">

    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-yellow-500 text-black px-6 py-2 rounded-full font-bold shadow-2xl opacity-0 pointer-events-none z-50"></div>

    <!-- ログイン画面 -->
    <div id="login-view" class="hidden flex flex-col items-center justify-center h-full gap-6">
        <h1 class="text-2xl font-bold text-yellow-500 tracking-widest">着順管理</h1>
        <p class="text-gray-400 text-sm">ワンボタン記録</p>
        <button onclick="signInWithGoogle()" class="bg-white text-gray-800 font-bold py-3 px-8 rounded-xl flex items-center gap-3 shadow-lg active:scale-95 transition-transform">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Googleでログイン
        </button>
    </div>

    <!-- メイン画面 -->
    <div id="main-view" class="hidden flex flex-col h-full">
        <div class="text-center mb-4 flex justify-between items-center">
            <h1 class="text-lg font-bold text-gray-500 tracking-widest">着順管理</h1>
            <div class="flex gap-2 items-center">
                <button onclick="toggleView('settings-view')" class="text-xs bg-gray-700 px-3 py-1 rounded">⚙️</button>
                <button onclick="signOut()" class="text-xs bg-gray-700 px-3 py-1 rounded text-gray-400">ログアウト</button>
            </div>
        </div>

        <!-- 期間フィルター -->
        <div class="flex gap-2 mb-3 text-xs">
            <button onclick="setFilter('today')" id="filter-today" class="flex-1 py-1 rounded bg-gray-700 text-gray-300">今日</button>
            <button onclick="setFilter('month')" id="filter-month" class="flex-1 py-1 rounded bg-gray-700 text-gray-300">今月</button>
            <button onclick="setFilter('all')" id="filter-all" class="flex-1 py-1 rounded bg-yellow-600 text-white">全期間</button>
        </div>

        <div class="bg-gray-800 rounded-xl p-4 shadow-lg mb-4">
            <div class="grid grid-cols-3 gap-2 border-b border-gray-700 pb-3 mb-3">
                <div class="text-center">
                    <p class="text-[10px] text-gray-400">平均着順</p>
                    <p id="avg-rank" class="text-2xl font-black text-yellow-500">0.00</p>
                </div>
                <div class="text-center border-x border-gray-700">
                    <p class="text-[10px] text-gray-400">対局数</p>
                    <p id="total-games" class="text-2xl font-black text-white">0</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] text-gray-400">合計Pt</p>
                    <p id="total-points" class="text-2xl font-black text-orange-500">0</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 items-end">
                <div>
                    <label class="text-[10px] text-gray-400 block mb-1">現在の残高 (手入力)</label>
                    <input type="number" id="current-balance" oninput="updateUI()" class="w-full bg-gray-900 border border-gray-700 rounded p-1 text-xl font-bold text-white outline-none focus:border-yellow-500" placeholder="0">
                </div>
                <div>
                    <p class="text-[10px] text-gray-400 mb-1">最終収支</p>
                    <p id="final-profit" class="text-xl font-bold text-green-400">±0</p>
                </div>
            </div>
            <div class="mt-3 flex items-center justify-between bg-gray-900 p-2 rounded-lg">
                <div class="flex flex-col">
                    <span class="text-[9px] text-gray-500 uppercase">Total Charge</span>
                    <span id="charge-display" class="font-mono font-bold text-yellow-500">0 pt</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="addCharge(10000)" class="bg-yellow-600 hover:bg-yellow-500 text-white text-[10px] font-bold py-2 px-3 rounded shadow-md active:scale-95 transition-all">+10,000</button>
                    <button onclick="resetCharge()" class="bg-gray-700 text-gray-400 text-[10px] py-2 px-2 rounded">Clear</button>
                </div>
            </div>
        </div>

        <div id="park-selectors" class="grid grid-cols-3 gap-2 mb-4"></div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <button onclick="addRecord(1)" class="bg-red-600 h-20 rounded-2xl text-4xl font-black shadow-lg active:scale-95 transition-transform">1</button>
            <button onclick="addRecord(2)" class="bg-blue-600 h-20 rounded-2xl text-4xl font-black shadow-lg active:scale-95 transition-transform">2</button>
            <button onclick="addRecord(3)" class="bg-green-600 h-20 rounded-2xl text-4xl font-black shadow-lg active:scale-95 transition-transform">3</button>
            <button onclick="addRecord(4)" class="bg-gray-600 h-20 rounded-2xl text-4xl font-black shadow-lg active:scale-95 transition-transform">4</button>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-4 text-xs">
            <button onclick="downloadCSV()" class="bg-indigo-600 py-3 rounded-lg font-bold shadow-lg">CSV保存</button>
            <button onclick="clearAll()" class="bg-red-900 py-3 rounded-lg font-bold shadow-lg">全データ削除</button>
        </div>

        <div class="flex-1 overflow-y-auto bg-gray-900 rounded-t-2xl p-4">
            <div class="flex justify-between mb-2 items-center text-xs">
                <span class="text-gray-400 font-bold tracking-wider">HISTORY</span>
                <button onclick="undo()" class="text-gray-600 underline">1つ取消</button>
            </div>
            <ul id="history-list" class="space-y-2 text-sm"></ul>
        </div>
    </div>

    <!-- 設定画面 -->
    <div id="settings-view" class="hidden flex flex-col h-full overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">パーク設定</h2>
            <button onclick="toggleView('main-view')" class="bg-green-600 px-4 py-1 rounded text-sm font-bold">完了</button>
        </div>
        <div class="bg-gray-800 p-4 rounded-xl mb-6">
            <label class="text-[10px] text-gray-400 uppercase font-bold">開始時の持参残高 (初期値)</label>
            <input type="number" id="initial-balance-setting" onchange="saveConfigs()" class="w-full bg-gray-700 p-3 rounded text-sm mt-1 outline-none" placeholder="例: 50000">
        </div>
        <div id="park-settings-list" class="space-y-6 mb-6"></div>
        <button onclick="addNewPark()" class="w-full py-4 border-2 border-dashed border-gray-600 rounded-xl text-gray-400 font-bold">+ パークを追加</button>
    </div>

    <!-- ローディング画面 -->
    <div id="loading-view" class="flex flex-col items-center justify-center h-full gap-4">
        <div class="text-yellow-500 text-4xl">⏳</div>
        <p class="text-gray-400 text-sm">読み込み中...</p>
    </div>

    <script>
        const SUPABASE_URL = 'https://zxrmngokgjlaoszdkoix.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_oBTUmfUKUDsAwkZc-mUbbA_0cvDiEgu';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let records = [];
        let chargeTotal = 0;
        let initialBalance = 0;
        let currentFilter = 'all';
        let parkConfigs = [
            { id: 0, name: 'パークA', base: 500, p1: 0, p4: 0 },
            { id: 1, name: 'パークB', base: 300, p1: 0, p4: 100 }
        ];
        let currentParkId = 0;

        // 初期化
        async function init() {
            showView('loading-view');
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                currentUser = session.user;
                await loadFromSupabase();
                showView('main-view');
            } else {
                showView('login-view');
            }

            sb.auth.onAuthStateChange(async (event, session) => {
                if (event === 'SIGNED_IN' && session) {
                    currentUser = session.user;
                    await loadFromSupabase();
                    showView('main-view');
                } else if (event === 'SIGNED_OUT') {
                    currentUser = null;
                    records = [];
                    showView('login-view');
                }
            });
        }

        async function signInWithGoogle() {
            await sb.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.href }
            });
        }

        async function signOut() {
            await sb.auth.signOut();
        }

        // Supabaseからデータ読み込み
        async function loadFromSupabase() {
            if (!currentUser) return;

            // レコード読み込み
            const { data: recordsData } = await sb
                .from('records')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: true });
            records = recordsData || [];

            // 設定読み込み
            const { data: configData } = await sb
                .from('configs')
                .select('*')
                .eq('user_id', currentUser.id)
                .single();

            if (configData) {
                chargeTotal = configData.charge_total || 0;
                initialBalance = configData.initial_balance || 0;
                parkConfigs = configData.park_configs || parkConfigs;
                currentParkId = parkConfigs[0]?.id || 0;
            }

            document.getElementById('initial-balance-setting').value = initialBalance;
            renderParkSelectors();
            updateUI();
        }

        // Supabaseにconfig保存
        async function saveToSupabase() {
            if (!currentUser) return;
            await sb.from('configs').upsert({
                user_id: currentUser.id,
                charge_total: chargeTotal,
                initial_balance: initialBalance,
                park_configs: parkConfigs,
                updated_at: new Date().toISOString()
            }, { onConflict: 'user_id' });
        }

        function showView(viewId) {
            ['login-view', 'main-view', 'settings-view', 'loading-view'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(viewId).classList.remove('hidden');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 20px)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -10px)';
            }, 2000);
        }

        function setFilter(filter) {
            currentFilter = filter;
            ['today', 'month', 'all'].forEach(f => {
                const btn = document.getElementById(`filter-${f}`);
                btn.className = `flex-1 py-1 rounded text-xs ${f === filter ? 'bg-yellow-600 text-white' : 'bg-gray-700 text-gray-300'}`;
            });
            updateUI();
        }

        function getFilteredRecords() {
            const now = new Date();
            return records.filter(r => {
                const d = new Date(r.created_at);
                if (currentFilter === 'today') {
                    return d.toDateString() === now.toDateString();
                } else if (currentFilter === 'month') {
                    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                }
                return true;
            });
        }

        async function addCharge(amount) {
            chargeTotal += amount;
            showToast(`+${amount.toLocaleString()} ptしました`);
            await saveToSupabase();
            updateUI();
        }

        async function resetCharge() {
            if (confirm('チャージ記録をリセットしますか？')) {
                chargeTotal = 0;
                await saveToSupabase();
                updateUI();
            }
        }

        function toggleView(viewId) {
            showView(viewId);
            if (viewId === 'settings-view') renderSettings();
            if (viewId === 'main-view') {
                saveConfigs();
                renderParkSelectors();
                updateUI();
            }
        }

        function renderParkSelectors() {
            const container = document.getElementById('park-selectors');
            container.innerHTML = '';
            parkConfigs.forEach(park => {
                const btn = document.createElement('button');
                btn.className = `bg-gray-700 py-2 rounded-lg text-[10px] font-bold transition-all ${currentParkId === park.id ? 'active-park' : ''}`;
                btn.innerHTML = `${park.name}<br><span class="font-normal text-[8px] opacity-70">${park.base}/${park.p1}/${park.p4}</span>`;
                btn.onclick = () => { currentParkId = park.id; renderParkSelectors(); };
                container.appendChild(btn);
            });
        }

        function renderSettings() {
            const container = document.getElementById('park-settings-list');
            container.innerHTML = '';
            parkConfigs.forEach((park, index) => {
                const div = document.createElement('div');
                div.className = 'bg-gray-800 p-4 rounded-xl space-y-3 relative shadow-inner';
                div.innerHTML = `
                    <button onclick="removePark(${index})" class="absolute top-2 right-2 text-red-500 text-[10px] font-bold">削除</button>
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-bold">パーク名</label>
                        <input type="text" value="${park.name}" onchange="updatePark(${index}, 'name', this.value)" class="w-full bg-gray-700 p-3 rounded text-sm focus:outline-none focus:ring-1 focus:ring-yellow-500">
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase font-bold">基本参加費</label>
                            <input type="number" value="${park.base}" onchange="updatePark(${index}, 'base', this.value)" class="w-full bg-gray-700 p-2 rounded text-xs">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase font-bold">1着祝儀等</label>
                            <input type="number" value="${park.p1 || 0}" onchange="updatePark(${index}, 'p1', this.value)" class="w-full bg-gray-700 p-2 rounded text-xs">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase font-bold">4着ペナ等</label>
                            <input type="number" value="${park.p4 || 0}" onchange="updatePark(${index}, 'p4', this.value)" class="w-full bg-gray-700 p-2 rounded text-xs">
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function updatePark(index, field, value) {
            parkConfigs[index][field] = field === 'name' ? value : parseInt(value);
        }

        function addNewPark() {
            parkConfigs.push({ id: Date.now(), name: 'NEW PARK', base: 0, p1: 0, p4: 0 });
            renderSettings();
        }

        function removePark(index) {
            if (confirm('削除しますか？')) { parkConfigs.splice(index, 1); renderSettings(); }
        }

        async function saveConfigs() {
            initialBalance = parseInt(document.getElementById('initial-balance-setting').value) || 0;
            await saveToSupabase();
        }

        async function addRecord(rank) {
            if (!currentUser) return;
            const park = parkConfigs.find(p => p.id === currentParkId) || parkConfigs[0];
            let pts = park ? park.base : 0;
            if (rank === 1) pts += (park.p1 || 0);
            if (rank === 4) pts += (park.p4 || 0);

            const { data, error } = await sb.from('records').insert({
                user_id: currentUser.id,
                rank,
                park_name: park ? park.name : 'Unknown',
                pts,
                created_at: new Date().toISOString()
            }).select().single();

            if (!error && data) {
                records.push(data);
                updateUI();
            }
        }

        function updateUI() {
            const filtered = getFilteredRecords();
            const list = document.getElementById('history-list');
            let sumRank = 0; let sumPoints = 0;
            list.innerHTML = '';

            filtered.slice().reverse().forEach(reg => {
                const li = document.createElement('li');
                li.className = `flex justify-between bg-gray-800 p-3 rounded-lg border-l-4 ${reg.rank === 1 ? 'border-red-600' : (reg.rank === 4 ? 'border-gray-500' : 'border-transparent')}`;
                const d = new Date(reg.created_at);
                const timeStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
                li.innerHTML = `<div><span class="font-bold">${reg.rank}着</span> <span class="text-[10px] text-gray-400 ml-1 font-normal">${reg.park_name}</span></div>
                                <div class="text-right text-[10px] text-gray-500 font-mono">${timeStr}<br><span class="text-orange-400 font-bold">${reg.pts >= 0 ? '-' : '+'}${Math.abs(reg.pts)}pt</span></div>`;
                list.appendChild(li);
                sumRank += reg.rank;
                sumPoints += reg.pts;
            });

            document.getElementById('avg-rank').innerText = filtered.length > 0 ? (sumRank / filtered.length).toFixed(2) : '0.00';
            document.getElementById('total-games').innerText = filtered.length;
            document.getElementById('total-points').innerText = sumPoints;
            document.getElementById('charge-display').innerText = `${chargeTotal.toLocaleString()} pt`;

            const currentBalance = parseInt(document.getElementById('current-balance').value) || 0;
            const finalProfit = (currentBalance - initialBalance) - chargeTotal + sumPoints;
            const profitEl = document.getElementById('final-profit');
            profitEl.innerText = `${finalProfit >= 0 ? '+' : ''}${finalProfit.toLocaleString()}`;
            profitEl.className = `text-xl font-bold ${finalProfit >= 0 ? 'text-green-400' : 'text-red-400'}`;
        }

        async function undo() {
            if (!records.length) return;
            if (!confirm('最新の記録を削除？')) return;
            const last = records[records.length - 1];
            await sb.from('records').delete().eq('id', last.id);
            records.pop();
            updateUI();
        }

        async function clearAll() {
            if (!confirm('データを全削除します。チャージ記録もリセットされますがよろしいですか？')) return;
            await sb.from('records').delete().eq('user_id', currentUser.id);
            records = [];
            chargeTotal = 0;
            await saveToSupabase();
            updateUI();
        }

        function downloadCSV() {
            const filtered = getFilteredRecords();
            if (!filtered.length) return alert('データがありません');
            const counts = { 1: 0, 2: 0, 3: 0, 4: 0 };
            let totalPts = 0;
            filtered.forEach(r => { counts[r.rank]++; totalPts += r.pts; });
            let csv = '\uFEFF時間,パーク,着順,消費Pt\n' + filtered.map(r => {
                const d = new Date(r.created_at);
                const t = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
                return `${t},${r.park_name},${r.rank},${r.pts}`;
            }).join('\n');
            csv += `\nチャージ総額,${chargeTotal}\n`;
            csv += '1着,2着,3着,4着,合計Pt\n';
            csv += `${counts[1]},${counts[2]},${counts[3]},${counts[4]},${totalPts}\n`;
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `chakujun_${new Date().toLocaleDateString()}.csv`;
            a.click();
        }

        init();
    </script>
</body>
</html>
