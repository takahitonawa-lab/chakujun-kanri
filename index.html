<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>着順管理 -ワンボタン記録-</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #1a1a1a; color: #e5e5e5; font-family: sans-serif; }
        .active-park { border: 2px solid #eab308; background-color: #374151 !important; }
        #toast { transition: opacity 0.3s, transform 0.3s; }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen">

    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-yellow-500 text-black px-6 py-2 rounded-full font-bold shadow-2xl opacity-0 pointer-events-none z-50"></div>

    <!-- ローディング -->
    <div id="loading-view" class="flex flex-col items-center justify-center h-screen gap-4">
        <p class="text-gray-400 text-sm">読み込み中...</p>
    </div>

    <!-- ログイン -->
    <div id="login-view" class="hidden flex flex-col items-center justify-center h-screen gap-6">
        <h1 class="text-2xl font-bold text-yellow-500 tracking-widest">着順管理</h1>
        <p class="text-gray-400 text-sm">ワンボタン記録</p>
        <button onclick="signInWithGoogle()" class="bg-white text-gray-800 font-bold py-3 px-8 rounded-xl flex items-center gap-3 shadow-lg active:scale-95 transition-transform">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Googleでログイン
        </button>
    </div>

    <!-- ホーム -->
    <div id="home-view" class="hidden flex flex-col h-full">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-lg font-bold text-yellow-500 tracking-widest">着順管理</h1>
            <div class="flex gap-2">
                <button onclick="showView('settings-view')" class="text-xs bg-gray-700 px-3 py-1 rounded">設定</button>
                <button onclick="signOut()" class="text-xs bg-gray-700 px-3 py-1 rounded text-gray-400">ログアウト</button>
            </div>
        </div>
        <div class="bg-gray-800 rounded-xl p-4 mb-4">
            <p class="text-[10px] text-gray-400 mb-2 uppercase tracking-wider">累計</p>
            <div class="grid grid-cols-3 gap-2">
                <div class="text-center"><p class="text-[10px] text-gray-400">来店回数</p><p id="total-visits" class="text-xl font-black text-white">0</p></div>
                <div class="text-center border-x border-gray-700"><p class="text-[10px] text-gray-400">平均着順</p><p id="overall-avg-rank" class="text-xl font-black text-yellow-500">-</p></div>
                <div class="text-center"><p class="text-[10px] text-gray-400">累計収支</p><p id="overall-profit" class="text-xl font-black text-green-400">±0円</p></div>
            </div>
        </div>
        <button onclick="startVisit()" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl text-xl shadow-lg active:scale-95 transition-transform mb-4">来店開始</button>
        <div class="flex-1 overflow-y-auto">
            <p class="text-[10px] text-gray-400 uppercase tracking-wider mb-2">来店履歴</p>
            <ul id="visit-history" class="space-y-3"></ul>
        </div>
    </div>

    <!-- 来店開始 -->
    <div id="start-visit-view" class="hidden flex flex-col h-full">
        <div class="flex items-center gap-3 mb-6">
            <button onclick="showView('home-view')" class="text-gray-400 text-sm">← 戻る</button>
            <h2 class="text-lg font-bold">来店開始</h2>
        </div>
        <div class="bg-gray-800 rounded-xl p-4 mb-4">
            <label class="text-[10px] text-gray-400 uppercase font-bold block mb-2">パーク選択</label>
            <div id="start-park-selectors" class="grid grid-cols-2 gap-2"></div>
        </div>
        <div class="bg-gray-800 rounded-xl p-4 mb-6">
            <label class="text-[10px] text-gray-400 uppercase font-bold block mb-3">入店時残高</label>
            <input type="number" id="visit-start-balance" class="w-full bg-gray-900 border border-gray-700 rounded p-3 text-2xl font-bold text-white outline-none focus:border-yellow-500 text-center mb-3" placeholder="10000">
            <div class="grid grid-cols-4 gap-2">
                <button onclick="adjustBalance('start', -10000)" class="bg-gray-700 py-2 rounded text-xs font-bold text-red-400">-10,000</button>
                <button onclick="adjustBalance('start', -1000)" class="bg-gray-700 py-2 rounded text-xs font-bold text-red-400">-1,000</button>
                <button onclick="adjustBalance('start', 1000)" class="bg-gray-700 py-2 rounded text-xs font-bold text-green-400">+1,000</button>
                <button onclick="adjustBalance('start', 10000)" class="bg-gray-700 py-2 rounded text-xs font-bold text-green-400">+10,000</button>
            </div>
        </div>
        <button onclick="confirmStartVisit()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl text-lg shadow-lg active:scale-95 transition-transform">記録を開始する</button>
    </div>

    <!-- 来店中 -->
    <div id="record-view" class="hidden flex flex-col h-full">
        <div class="flex justify-between items-center mb-3">
            <div>
                <p id="record-park-name" class="text-sm font-bold text-yellow-500"></p>
                <p id="record-start-time" class="text-[10px] text-gray-400"></p>
            </div>
            <button onclick="endVisit()" class="text-xs bg-red-800 px-3 py-2 rounded font-bold">退店</button>
        </div>
        <div class="bg-gray-800 rounded-xl p-4 mb-4">
            <div class="grid grid-cols-3 gap-2 mb-3">
                <div class="text-center"><p class="text-[10px] text-gray-400">平均着順</p><p id="visit-avg-rank" class="text-2xl font-black text-yellow-500">-</p></div>
                <div class="text-center border-x border-gray-700"><p class="text-[10px] text-gray-400">対局数</p><p id="visit-total-games" class="text-2xl font-black text-white">0</p></div>
                <div class="text-center"><p class="text-[10px] text-gray-400">消費コスト</p><p id="visit-total-pts" class="text-2xl font-black text-orange-500">0</p></div>
            </div>
            <!-- 追加チャージ -->
            <div class="bg-gray-900 p-3 rounded-lg">
                <div class="flex justify-between items-center mb-2">
                    <p class="text-[9px] text-gray-500 uppercase">追加チャージ</p>
                    <div class="flex items-center gap-2">
                        <p id="visit-charge-display" class="font-mono font-bold text-yellow-500 text-sm">0円</p>
                        <button onclick="resetVisitCharge()" class="bg-gray-700 text-gray-400 text-[9px] py-1 px-2 rounded">Clear</button>
                    </div>
                </div>
                <div class="grid grid-cols-4 gap-1">
                    <button onclick="adjustCharge(-10000)" class="bg-gray-700 py-2 rounded text-[10px] font-bold text-red-400">-10,000</button>
                    <button onclick="adjustCharge(-1000)" class="bg-gray-700 py-2 rounded text-[10px] font-bold text-red-400">-1,000</button>
                    <button onclick="adjustCharge(1000)" class="bg-gray-700 py-2 rounded text-[10px] font-bold text-green-400">+1,000</button>
                    <button onclick="adjustCharge(10000)" class="bg-gray-700 py-2 rounded text-[10px] font-bold text-green-400">+10,000</button>
                </div>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <button onclick="addRecord(1)" class="bg-red-600 h-20 rounded-2xl text-4xl font-black shadow-lg active:scale-95 transition-transform">1</button>
            <button onclick="addRecord(2)" class="bg-blue-600 h-20 rounded-2xl text-4xl font-black shadow-lg active:scale-95 transition-transform">2</button>
            <button onclick="addRecord(3)" class="bg-green-600 h-20 rounded-2xl text-4xl font-black shadow-lg active:scale-95 transition-transform">3</button>
            <button onclick="addRecord(4)" class="bg-gray-600 h-20 rounded-2xl text-4xl font-black shadow-lg active:scale-95 transition-transform">4</button>
        </div>
        <div class="flex-1 overflow-y-auto bg-gray-900 rounded-t-2xl p-4">
            <div class="flex justify-between mb-2 items-center text-xs">
                <span class="text-gray-400 font-bold tracking-wider">HISTORY</span>
                
            </div>
            <ul id="record-history" class="space-y-2 text-sm"></ul>
        </div>
    </div>

    <!-- 退店 -->
    <div id="end-visit-view" class="hidden flex flex-col h-full">
        <div class="flex items-center gap-3 mb-6">
            <button onclick="showView('record-view')" class="text-gray-400 text-sm">← 戻る</button>
            <h2 class="text-lg font-bold">退店・集計</h2>
        </div>
        <div class="bg-gray-800 rounded-xl p-4 mb-4">
            <div class="grid grid-cols-2 gap-4 text-center">
                <div><p class="text-[10px] text-gray-400">対局数</p><p id="end-total-games" class="text-2xl font-black text-white">0</p></div>
                <div><p class="text-[10px] text-gray-400">平均着順</p><p id="end-avg-rank" class="text-2xl font-black text-yellow-500">-</p></div>
            </div>
        </div>
        <div class="bg-gray-800 rounded-xl p-4 mb-4">
            <label class="text-[10px] text-gray-400 uppercase font-bold block mb-3">退店時残高</label>
            <input type="number" id="visit-end-balance" oninput="calcEndProfit()" class="w-full bg-gray-900 border border-gray-700 rounded p-3 text-2xl font-bold text-white outline-none focus:border-yellow-500 text-center mb-3" placeholder="0">
            <div class="grid grid-cols-4 gap-2 mb-3">
                <button onclick="adjustBalance('end', -10000)" class="bg-gray-700 py-2 rounded text-xs font-bold text-red-400">-10,000</button>
                <button onclick="adjustBalance('end', -1000)" class="bg-gray-700 py-2 rounded text-xs font-bold text-red-400">-1,000</button>
                <button onclick="adjustBalance('end', 1000)" class="bg-gray-700 py-2 rounded text-xs font-bold text-green-400">+1,000</button>
                <button onclick="adjustBalance('end', 10000)" class="bg-gray-700 py-2 rounded text-xs font-bold text-green-400">+10,000</button>
            </div>
            <div class="flex justify-between items-center">
                <p class="text-[10px] text-gray-400">今日の収支</p>
                <p id="end-profit" class="text-xl font-black text-green-400">-</p>
            </div>
        </div>
        <div class="bg-gray-800 rounded-xl p-4 mb-6">
            <label class="text-[10px] text-gray-400 uppercase font-bold block mb-2">メモ（任意）</label>
            <textarea id="visit-memo" class="w-full bg-gray-900 border border-gray-700 rounded p-3 text-sm text-white outline-none focus:border-yellow-500 resize-none" rows="3" placeholder="今日の振り返りなど..."></textarea>
        </div>
        <button onclick="confirmEndVisit()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl text-lg shadow-lg active:scale-95 transition-transform">保存して終了</button>
    </div>

    <!-- 来店詳細 -->
    <div id="visit-detail-view" class="hidden flex flex-col h-full">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-3">
                <button onclick="showView('home-view')" class="text-gray-400 text-sm">← 戻る</button>
                <h2 class="text-lg font-bold">来店詳細</h2>
            </div>
            <div class="flex gap-2">
                <button id="detail-edit-btn" onclick="toggleDetailEdit()" class="text-xs bg-gray-700 px-3 py-1 rounded">編集</button>
                <button onclick="deleteVisit()" class="text-xs bg-red-900 px-3 py-1 rounded">削除</button>
            </div>
        </div>
        <div id="visit-detail-content" class="flex-1 overflow-y-auto"></div>
    </div>

    <!-- 設定 -->
    <div id="settings-view" class="hidden flex flex-col h-full overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">パーク設定</h2>
            <button onclick="saveSettingsAndBack()" class="bg-green-600 px-4 py-1 rounded text-sm font-bold">完了</button>
        </div>
        <div id="park-settings-list" class="space-y-6 mb-6"></div>
        <button onclick="addNewPark()" class="w-full py-4 border-2 border-dashed border-gray-600 rounded-xl text-gray-400 font-bold">+ パークを追加</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://zxrmngokgjlaoszdkoix.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_oBTUmfUKUDsAwkZc-mUbbA_0cvDiEgu';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let parkConfigs = [
            { id: 0, name: 'パークA', base: 500, p1: 0, p4: 0 },
            { id: 1, name: 'パークB', base: 300, p1: 0, p4: 100 }
        ];
        let selectedParkId = 0;
        let currentVisit = null; // Supabaseに保存済みのvisitオブジェクト
        let currentRecords = [];
        let visits = [];
        let lastStartBalance = 10000; // 前回の入店時残高

        async function init() {
            showView('loading-view');
            const { data: { session } } = await sb.auth.getSession();
            if (session) { currentUser = session.user; await loadData(); }
            else showView('login-view');
            sb.auth.onAuthStateChange(async (event, session) => {
                if (event === 'SIGNED_IN' && session) { currentUser = session.user; await loadData(); }
                else if (event === 'SIGNED_OUT') { currentUser = null; showView('login-view'); }
            });
        }

        async function signInWithGoogle() {
            await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
        }
        async function signOut() { await sb.auth.signOut(); }

        async function loadData() {
            const { data: cfg } = await sb.from('configs').select('*').eq('user_id', currentUser.id).single();
            if (cfg) {
                parkConfigs = cfg.park_configs || parkConfigs;
                lastStartBalance = cfg.last_start_balance || 10000;
                if (cfg.current_visit_id) {
                    const { data: v } = await sb.from('visits').select('*').eq('id', cfg.current_visit_id).single();
                    if (v && !v.ended_at) {
                        currentVisit = v;
                        const { data: recs } = await sb.from('records').select('*').eq('visit_id', v.id).order('created_at', { ascending: true });
                        currentRecords = recs || [];
                    }
                }
            }
            const { data: vs } = await sb.from('visits').select('*').eq('user_id', currentUser.id).not('ended_at', 'is', null).order('started_at', { ascending: false });
            visits = vs || [];
            renderHome();
            if (currentVisit) { showView('record-view'); renderRecordView(); }
            else showView('home-view');
        }

        async function saveConfigs(extra = {}) {
            await sb.from('configs').upsert({
                user_id: currentUser.id,
                park_configs: parkConfigs,
                current_visit_id: currentVisit?.id || null,
                last_start_balance: lastStartBalance,
                updated_at: new Date().toISOString(),
                ...extra
            }, { onConflict: 'user_id' });
        }

        function showView(id) {
            ['loading-view','login-view','home-view','start-visit-view','record-view','end-visit-view','visit-detail-view','settings-view'].forEach(v => {
                document.getElementById(v).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            if (id === 'settings-view') renderSettings();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = '1'; t.style.transform = 'translate(-50%, 20px)';
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -10px)'; }, 2000);
        }

        // 残高調整ボタン
        function adjustBalance(type, delta) {
            const id = type === 'start' ? 'visit-start-balance' : 'visit-end-balance';
            const input = document.getElementById(id);
            const current = parseInt(input.value) || 0;
            input.value = Math.max(0, current + delta);
            if (type === 'end') calcEndProfit();
        }

        function adjustCharge(delta) {
            if (!currentVisit) return;
            currentVisit.charge_total = Math.max(0, (currentVisit.charge_total || 0) + delta);
            updateVisitCharge();
        }

        async function updateVisitCharge() {
            await sb.from('visits').update({ charge_total: currentVisit.charge_total }).eq('id', currentVisit.id);
            updateRecordUI();
            if (currentVisit.charge_total !== 0) showToast(`チャージ合計: ${currentVisit.charge_total.toLocaleString()}円`);
        }

        async function resetVisitCharge() {
            if (!confirm('チャージ記録をリセットしますか？')) return;
            currentVisit.charge_total = 0;
            await updateVisitCharge();
        }

        function renderHome() {
            document.getElementById('total-visits').innerText = visits.length;
            const allRanks = visits.filter(v => v.avg_rank).map(v => v.avg_rank);
            document.getElementById('overall-avg-rank').innerText = allRanks.length > 0 ? (allRanks.reduce((a,b)=>a+b,0)/allRanks.length).toFixed(2) : '-';
            const totalProfit = visits.reduce((s,v) => s + (v.profit||0), 0);
            const el = document.getElementById('overall-profit');
            el.innerText = `${totalProfit >= 0 ? '+' : ''}${totalProfit.toLocaleString()}円`;
            el.className = `text-xl font-black ${totalProfit >= 0 ? 'text-green-400' : 'text-red-400'}`;
            const list = document.getElementById('visit-history');
            list.innerHTML = visits.length === 0 ? '<p class="text-gray-600 text-sm text-center py-8">来店履歴がありません</p>' : '';
            visits.forEach(v => {
                const li = document.createElement('li');
                li.className = 'bg-gray-800 rounded-xl p-4 cursor-pointer active:bg-gray-700';
                const d = new Date(v.started_at);
                const profit = v.profit || 0;
                li.innerHTML = `<div class="flex justify-between items-start">
                    <div><p class="font-bold text-sm">${v.park_name}</p>
                    <p class="text-[10px] text-gray-400">${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ・ ${v.total_games||0}戦 ・ 平均${v.avg_rank ? v.avg_rank.toFixed(2) : '-'}着</p>
                    ${v.memo ? `<p class="text-[10px] text-gray-500 mt-1">${v.memo}</p>` : ''}</div>
                    <p class="font-black text-lg ${profit >= 0 ? 'text-green-400' : 'text-red-400'}">${profit >= 0 ? '+' : ''}${profit.toLocaleString()}円</p>
                </div>`;
                li.onclick = () => showVisitDetail(v);
                list.appendChild(li);
            });
        }

        function startVisit() {
            if (currentVisit) { showView('record-view'); renderRecordView(); return; }
            selectedParkId = parkConfigs[0]?.id || 0;
            renderStartParkSelectors();
            document.getElementById('visit-start-balance').value = lastStartBalance;
            showView('start-visit-view');
        }

        function renderStartParkSelectors() {
            const c = document.getElementById('start-park-selectors');
            c.innerHTML = '';
            parkConfigs.forEach(p => {
                const btn = document.createElement('button');
                btn.className = `py-3 rounded-lg text-sm font-bold transition-all bg-gray-700 ${selectedParkId === p.id ? 'active-park' : ''}`;
                btn.innerHTML = `${p.name}<br><span class="font-normal text-[10px] opacity-70">${p.base}pt</span>`;
                btn.onclick = () => { selectedParkId = p.id; renderStartParkSelectors(); };
                c.appendChild(btn);
            });
        }

        async function confirmStartVisit() {
            const park = parkConfigs.find(p => p.id === selectedParkId) || parkConfigs[0];
            const startBal = parseInt(document.getElementById('visit-start-balance').value) || 0;
            lastStartBalance = startBal;

            // まずSupabaseにvisitを保存してUUIDを取得
            const { data: newVisit, error } = await sb.from('visits').insert({
                user_id: currentUser.id,
                park_name: park.name,
                park_config: park,
                start_balance: startBal,
                charge_total: 0,
                started_at: new Date().toISOString()
            }).select().single();

            if (error || !newVisit) { showToast('エラーが発生しました'); return; }

            currentVisit = newVisit;
            currentRecords = [];
            await saveConfigs();
            showView('record-view');
            renderRecordView();
        }

        function renderRecordView() {
            if (!currentVisit) return;
            document.getElementById('record-park-name').innerText = currentVisit.park_name;
            const d = new Date(currentVisit.started_at);
            document.getElementById('record-start-time').innerText = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')} 入店`;
            updateRecordUI();
        }

        function updateRecordUI() {
            let sumRank = 0, sumPts = 0;
            const list = document.getElementById('record-history');
            list.innerHTML = '';
            currentRecords.slice().reverse().forEach(r => {
                const li = document.createElement('li');
                li.className = `flex justify-between bg-gray-800 p-3 rounded-lg border-l-4 ${r.rank===1?'border-red-600':r.rank===4?'border-gray-500':'border-transparent'}`;
                const d = new Date(r.created_at);
                const changingId = window._changingRecordId;
                if (changingId === r.id) {
                    const rankBtns = [1,2,3,4].map(n => `<button onclick="applyRecordChange('${r.id}',${n})" class="w-9 h-9 rounded font-black text-sm ${r.rank===n?'bg-gray-600 text-gray-500':'bg-gray-700 text-white active:scale-95'}" ${r.rank===n?'disabled':''}>${n}</button>`).join('');
                    li.innerHTML = `<div class="flex items-center gap-1">${rankBtns}</div><button onclick="cancelRecordChange()" class="text-gray-500 text-[10px] px-2 py-1">✕</button>`;
                } else {
                    li.innerHTML = `<div class="flex items-center gap-2"><span class="font-black text-lg w-8">${r.rank}着</span><span class="text-[10px] text-orange-400 font-mono">${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')} -${r.pts}pt</span></div><div class="flex gap-1"><button onclick="startRecordChange('${r.id}')" class="bg-gray-700 text-[10px] px-2 py-1 rounded">変更</button><button onclick="deleteRecord('${r.id}')" class="bg-red-900 text-[10px] px-2 py-1 rounded">削除</button></div>`;
                }
                list.appendChild(li);
                sumRank += r.rank; sumPts += r.pts;
            });
            document.getElementById('visit-avg-rank').innerText = currentRecords.length > 0 ? (sumRank/currentRecords.length).toFixed(2) : '-';
            document.getElementById('visit-total-games').innerText = currentRecords.length;
            document.getElementById('visit-total-pts').innerText = sumPts;
            document.getElementById('visit-charge-display').innerText = `${(currentVisit?.charge_total||0).toLocaleString()}円`;
        }

        async function addRecord(rank) {
            if (!currentVisit) return;
            const park = currentVisit.park_config;
            let pts = park.base || 0;
            if (rank === 1) pts += (park.p1 || 0);
            if (rank === 4) pts += (park.p4 || 0);
            const { data, error } = await sb.from('records').insert({
                visit_id: currentVisit.id,
                user_id: currentUser.id,
                rank, pts,
                created_at: new Date().toISOString()
            }).select().single();
            if (!error && data) { currentRecords.push(data); updateRecordUI(); }
            else showToast('保存エラー: ' + (error?.message || ''));
        }

        async function deleteRecord(id) {
            if (!confirm('この記録を削除しますか？')) return;
            await sb.from('records').delete().eq('id', id);
            currentRecords = currentRecords.filter(r => r.id !== id);
            updateRecordUI();
            showToast('削除しました');
        }


        function endVisit() {
            const totalGames = currentRecords.length;
            const sumRank = currentRecords.reduce((s,r) => s+r.rank, 0);
            document.getElementById('end-total-games').innerText = totalGames;
            document.getElementById('end-avg-rank').innerText = totalGames > 0 ? (sumRank/totalGames).toFixed(2) : '-';
            document.getElementById('visit-end-balance').value = '';
            document.getElementById('end-profit').innerText = '-';
            document.getElementById('visit-memo').value = '';
            showView('end-visit-view');
        }

        function calcEndProfit() {
            const endBal = parseInt(document.getElementById('visit-end-balance').value) || 0;
            const profit = endBal - (currentVisit.start_balance||0) - (currentVisit.charge_total||0);
            const el = document.getElementById('end-profit');
            el.innerText = `${profit >= 0 ? '+' : ''}${profit.toLocaleString()}円`;
            el.className = `text-xl font-black ${profit >= 0 ? 'text-green-400' : 'text-red-400'}`;
        }

        async function confirmEndVisit() {
            const endBal = parseInt(document.getElementById('visit-end-balance').value) || 0;
            const memo = document.getElementById('visit-memo').value;
            const totalGames = currentRecords.length;
            const sumRank = currentRecords.reduce((s,r)=>s+r.rank,0);
            const sumPts = currentRecords.reduce((s,r)=>s+r.pts,0);
            const profit = endBal - (currentVisit.start_balance||0) - (currentVisit.charge_total||0);

            await sb.from('visits').update({
                end_balance: endBal, profit, total_games: totalGames,
                avg_rank: totalGames > 0 ? sumRank/totalGames : null,
                total_pts: sumPts, memo, ended_at: new Date().toISOString()
            }).eq('id', currentVisit.id);

            const updatedVisit = { ...currentVisit, end_balance: endBal, profit, total_games: totalGames, avg_rank: totalGames > 0 ? sumRank/totalGames : null, total_pts: sumPts, memo, ended_at: new Date().toISOString() };
            visits.unshift(updatedVisit);
            currentVisit = null; currentRecords = [];
            await saveConfigs();
            renderHome(); showView('home-view');
            showToast('来店記録を保存しました');
        }

        let detailVisit = null;
        let detailRecords = [];
        let detailEditMode = false;

        async function showVisitDetail(visit) {
            detailVisit = visit;
            detailEditMode = false;
            const { data: recs } = await sb.from('records').select('*').eq('visit_id', visit.id).order('created_at', { ascending: true });
            detailRecords = recs || [];
            document.getElementById('detail-edit-btn').innerText = '編集';
            renderDetailView();
            showView('visit-detail-view');
        }

        function toggleDetailEdit() {
            detailEditMode = !detailEditMode;
            document.getElementById('detail-edit-btn').innerText = detailEditMode ? '完了' : '編集';
            if (!detailEditMode) saveDetailChanges();
            renderDetailView();
        }

        async function deleteVisit() {
            if (!confirm('この来店記録を削除しますか？\n着順記録も全て削除されます。')) return;
            await sb.from('records').delete().eq('visit_id', detailVisit.id);
            await sb.from('visits').delete().eq('id', detailVisit.id);
            visits = visits.filter(v => v.id !== detailVisit.id);
            renderHome();
            showView('home-view');
            showToast('削除しました');
        }

        async function saveDetailChanges() {
            const profit = (detailVisit.end_balance||0) - (detailVisit.start_balance||0) - (detailVisit.charge_total||0);
            const totalGames = detailRecords.length;
            const sumRank = detailRecords.reduce((s,r)=>s+r.rank,0);
            const avgRank = totalGames > 0 ? sumRank/totalGames : null;
            const totalPts = detailRecords.reduce((s,r)=>s+r.pts,0);
            detailVisit.profit = profit;
            detailVisit.total_games = totalGames;
            detailVisit.avg_rank = avgRank;
            detailVisit.total_pts = totalPts;
            await sb.from('visits').update({
                park_name: detailVisit.park_name,
                start_balance: detailVisit.start_balance,
                end_balance: detailVisit.end_balance,
                charge_total: detailVisit.charge_total,
                profit, total_games: totalGames, avg_rank: avgRank, total_pts: totalPts,
                memo: detailVisit.memo
            }).eq('id', detailVisit.id);
            const idx = visits.findIndex(v => v.id === detailVisit.id);
            if (idx >= 0) visits[idx] = { ...detailVisit };
            renderHome();
            showToast('保存しました');
        }

        function renderDetailView() {
            const v = detailVisit;
            const profit = (v.end_balance||0) - (v.start_balance||0) - (v.charge_total||0);
            const d = new Date(v.started_at);
            const edit = detailEditMode;

            const balanceButtons = (field) => `
                <div class="grid grid-cols-4 gap-1 mt-2">
                    <button onclick="adjustDetailBalance('${field}',-10000)" class="bg-gray-700 py-1 rounded text-[10px] font-bold text-red-400">-10,000</button>
                    <button onclick="adjustDetailBalance('${field}',-1000)" class="bg-gray-700 py-1 rounded text-[10px] font-bold text-red-400">-1,000</button>
                    <button onclick="adjustDetailBalance('${field}',1000)" class="bg-gray-700 py-1 rounded text-[10px] font-bold text-green-400">+1,000</button>
                    <button onclick="adjustDetailBalance('${field}',10000)" class="bg-gray-700 py-1 rounded text-[10px] font-bold text-green-400">+10,000</button>
                </div>`;

            let recordsHtml = detailRecords.map((r, i) => {
                const rd = new Date(r.created_at);
                const t = `${rd.getHours()}:${String(rd.getMinutes()).padStart(2,'0')}`;
                if (edit) {
                    const btns = [1,2,3,4].map(n => `<button onclick="changeDetailRecord('${r.id}',${n})" class="w-8 h-8 rounded font-black text-sm ${r.rank===n?'bg-gray-600 text-gray-500':'bg-gray-700 text-white active:scale-95'}" ${r.rank===n?'disabled':''}>${n}</button>`).join('');
                    return `<li class="flex items-center justify-between bg-gray-800 p-3 rounded-lg">
                        <div class="flex items-center gap-2">${btns}<span class="text-[10px] text-gray-500 ml-1">${t}</span></div>
                        <button onclick="deleteDetailRecord('${r.id}')" class="bg-red-900 text-[10px] px-2 py-1 rounded ml-2">削除</button>
                    </li>`;
                } else {
                    return `<li class="flex justify-between bg-gray-800 p-3 rounded-lg border-l-4 ${r.rank===1?'border-red-600':r.rank===4?'border-gray-500':'border-transparent'}">
                        <span class="font-black">${r.rank}着</span>
                        <span class="text-[10px] text-orange-400 font-mono">${t} -${r.pts}pt</span>
                    </li>`;
                }
            }).join('');

            document.getElementById('visit-detail-content').innerHTML = `
                <div class="bg-gray-800 rounded-xl p-4 mb-4">
                    ${edit ? `<input type="text" value="${v.park_name}" onchange="detailVisit.park_name=this.value" class="w-full bg-gray-700 p-2 rounded text-sm font-bold outline-none mb-1">` : `<p class="font-bold text-lg">${v.park_name}</p>`}
                    <p class="text-[10px] text-gray-400">${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}</p>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-gray-800 rounded-xl p-4 text-center"><p class="text-[10px] text-gray-400">収支</p><p class="text-2xl font-black ${profit>=0?'text-green-400':'text-red-400'}">${profit>=0?'+':''}${profit.toLocaleString()}円</p></div>
                    <div class="bg-gray-800 rounded-xl p-4 text-center"><p class="text-[10px] text-gray-400">平均着順</p><p class="text-2xl font-black text-yellow-500">${detailRecords.length>0?(detailRecords.reduce((s,r)=>s+r.rank,0)/detailRecords.length).toFixed(2):'-'}</p></div>
                    <div class="bg-gray-800 rounded-xl p-4 text-center"><p class="text-[10px] text-gray-400">対局数</p><p class="text-2xl font-black text-white">${detailRecords.length}</p></div>
                    <div class="bg-gray-800 rounded-xl p-4 text-center"><p class="text-[10px] text-gray-400">消費コスト</p><p class="text-2xl font-black text-orange-500">${detailRecords.reduce((s,r)=>s+r.pts,0)}pt</p></div>
                </div>
                <div class="bg-gray-800 rounded-xl p-4 mb-4 text-sm space-y-3">
                    <div>
                        <p class="text-[10px] text-gray-400 mb-1">入店残高</p>
                        ${edit ? `<input type="number" value="${v.start_balance||0}" onchange="detailVisit.start_balance=parseInt(this.value)||0;renderDetailView()" class="w-full bg-gray-700 p-2 rounded outline-none text-white">${balanceButtons('start_balance')}` : `<p class="text-white">${(v.start_balance||0).toLocaleString()}円</p>`}
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-400 mb-1">退店残高</p>
                        ${edit ? `<input type="number" value="${v.end_balance||0}" onchange="detailVisit.end_balance=parseInt(this.value)||0;renderDetailView()" class="w-full bg-gray-700 p-2 rounded outline-none text-white">${balanceButtons('end_balance')}` : `<p class="text-white">${(v.end_balance||0).toLocaleString()}円</p>`}
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-400 mb-1">追加チャージ</p>
                        ${edit ? `<input type="number" value="${v.charge_total||0}" onchange="detailVisit.charge_total=parseInt(this.value)||0;renderDetailView()" class="w-full bg-gray-700 p-2 rounded outline-none text-white">${balanceButtons('charge_total')}` : `<p class="text-white">${(v.charge_total||0).toLocaleString()}円</p>`}
                    </div>
                </div>
                <div class="bg-gray-800 rounded-xl p-4 mb-4">
                    <p class="text-[10px] text-gray-400 mb-2">メモ</p>
                    ${edit ? `<textarea onchange="detailVisit.memo=this.value" class="w-full bg-gray-700 p-2 rounded text-sm outline-none text-white resize-none" rows="3">${v.memo||''}</textarea>` : `<p class="text-sm text-white">${v.memo||'なし'}</p>`}
                </div>
                ${detailRecords.length > 0 ? `
                <div class="bg-gray-800 rounded-xl p-4 mb-4">
                    <p class="text-[10px] text-gray-400 mb-2">着順記録</p>
                    <ul class="space-y-2">${recordsHtml}</ul>
                </div>` : ''}
            `;
        }

        function adjustDetailBalance(field, delta) {
            detailVisit[field] = Math.max(0, (detailVisit[field]||0) + delta);
            renderDetailView();
        }

        async function changeDetailRecord(id, newRank) {
            const rec = detailRecords.find(r => r.id === id);
            if (!rec) return;
            const park = detailVisit.park_config;
            let pts = park.base || 0;
            if (newRank === 1) pts += (park.p1 || 0);
            if (newRank === 4) pts += (park.p4 || 0);
            await sb.from('records').update({ rank: newRank, pts }).eq('id', id);
            rec.rank = newRank; rec.pts = pts;
            renderDetailView();
        }

        async function deleteDetailRecord(id) {
            if (!confirm('この記録を削除しますか？')) return;
            await sb.from('records').delete().eq('id', id);
            detailRecords = detailRecords.filter(r => r.id !== id);
            renderDetailView();
        }

        function renderSettings() {
            const c = document.getElementById('park-settings-list');
            c.innerHTML = '';
            parkConfigs.forEach((park, i) => {
                const div = document.createElement('div');
                div.className = 'bg-gray-800 p-4 rounded-xl space-y-3 relative';
                div.innerHTML = `
                    <button onclick="removePark(${i})" class="absolute top-2 right-2 text-red-500 text-[10px] font-bold">削除</button>
                    <div><label class="text-[10px] text-gray-500 uppercase font-bold">パーク名</label>
                    <input type="text" value="${park.name}" onchange="parkConfigs[${i}].name=this.value" class="w-full bg-gray-700 p-3 rounded text-sm mt-1 outline-none"></div>
                    <div class="grid grid-cols-3 gap-2">
                        <div><label class="text-[10px] text-gray-500 uppercase font-bold">基本参加費</label>
                        <input type="number" value="${park.base}" onchange="parkConfigs[${i}].base=parseInt(this.value)||0" class="w-full bg-gray-700 p-2 rounded text-xs mt-1"></div>
                        <div><label class="text-[10px] text-gray-500 uppercase font-bold">1着祝儀</label>
                        <input type="number" value="${park.p1||0}" onchange="parkConfigs[${i}].p1=parseInt(this.value)||0" class="w-full bg-gray-700 p-2 rounded text-xs mt-1"></div>
                        <div><label class="text-[10px] text-gray-500 uppercase font-bold">4着ペナ</label>
                        <input type="number" value="${park.p4||0}" onchange="parkConfigs[${i}].p4=parseInt(this.value)||0" class="w-full bg-gray-700 p-2 rounded text-xs mt-1"></div>
                    </div>`;
                c.appendChild(div);
            });
        }

        function addNewPark() { parkConfigs.push({ id: Date.now(), name: 'NEW PARK', base: 0, p1: 0, p4: 0 }); renderSettings(); }
        function removePark(i) { if (confirm('削除しますか？')) { parkConfigs.splice(i, 1); renderSettings(); } }
        async function saveSettingsAndBack() { await saveConfigs(); showView('home-view'); renderHome(); }

        init();
    </script>
</body>
</html>
